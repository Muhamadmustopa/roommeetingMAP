<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadwal Meeting</title>

  <style>
    body {   
      margin: 0;
      padding: 20px;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.55),
          rgba(0, 0, 0, 0.55)
        ),
        url("mas.png") no-repeat center/cover;
      color: #fff;
    }

    .logo {
      display: block;
      width: 130px;
      margin: 0 auto 10px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    #clock {
      margin-right: auto;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.2);
      padding: 6px 12px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }

    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-login {
      background: #00d4ff;
      color: #000;
    }

    .btn-logout {
      background: #ff4d4d;
      color: #fff;
    }

    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .column {
      flex: 1;
      background: rgba(255, 255, 255, 0.15);
      padding: 16px;
      border-radius: 18px;
      min-width: 260px;
    }

    .column h3 {
      text-align: center;
      margin: 6px 0 14px;
    }

   .booking {
  background: rgba(255, 255, 255, 0.18);
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 14px;
  cursor: pointer;
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 6px 14px rgba(0,0,0,0.35);
}

.booking:hover {
  transform: translateY(-4px);
  background: rgba(255, 255, 255, 0.28);
}

    /* ==================================================
       ✅ LIVE BOOKING (Glow Hijau Paling Ringan)
    ================================================== */
    .booking.live {
  background: transparent !important;
  border: 2px solid transparent;
  box-shadow: 0 0 14px rgba(0, 255, 0, 0.9);
  position: relative;
}

.booking.live::before {
  content: "🟢";
  position: absolute;
  top: 8px;
  right: 10px;
  font-size: 10px;
  font-weight: bold;
  padding: 4px 8px;
  border-radius: 20px;
  background: green;
  color: white;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.5; }
}

    .icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 16px;
      margin-right: 6px;
    }

    .icon-delete {
      color: #ff4d4d;
    }

    .icon-edit {
      color: #00d4ff;
    }

    .fab {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #0090ff);
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      text-decoration: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;

      backdrop-filter: blur(8px);
    }

    .modal-box {
      background: linear-gradient(
          rgba(0, 0, 0, 0.55),
          rgba(0, 0, 0, 0.55)
        ),
        url("citylight.png") no-repeat center/cover;

      color: #fff;
      padding: 26px;
      width: 360px;
      border-radius: 22px;

      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);

      animation: popup 0.35s ease;
    }

    @keyframes popup {
      from {
        transform: scale(0.85);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-box h3 {
      font-size: 20px;
      margin-bottom: 14px;
      text-align: center;
    }

    .modal-box p {
      font-size: 15px;
      margin: 10px 0;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.15);
    }

    .close {
      float: right;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      color: white;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin: 6px 0;
    }
  </style>
</head>

<body>
  <!-- TOP BAR -->
  <div class="top-bar">
    <div id="clock">--</div>
    <button id="loginBtn" class="btn btn-login">@</button>
    <button id="logoutBtn" class="btn btn-logout" style="display: none">
      Logout
    </button>
  </div>

  <img src="map-log.png" class="logo" />

  <h1>
    Jadwal Penggunaan Ruang Meeting <br />
    PT Mitra Asa Pratama
  </h1>

  <!-- ROOM COLUMNS -->
  <div class="container">
    <div class="column">
      <h3>Ruang Arjuna</h3>
      <div id="arjuna"></div>
    </div>

    <div class="column">
      <h3>Ruang Srikandi</h3>
      <div id="srikandi"></div>
    </div>

    <div class="column">
      <h3>Ruang Gatot Kaca</h3>
      <div id="gatot"></div>
    </div>
  </div>

  <!-- ADD BUTTON -->
  <a href="daftar.html" class="fab" id="addBtn">+</a>

  <!-- DETAIL MODAL -->
  <div class="modal" id="modal">
    <div class="modal-box">
      <span class="close" id="closeDetail">✖</span>

      <h3 id="mAgenda"></h3>

      <p>🏢 Ruangan: <b><span id="mRuangan"></span></b></p>
      <p>📅 Tanggal: <b><span id="mTanggal"></span></b></p>
      <p>⏰ Jam: <b><span id="mJam"></span></b></p>
      <p>👤 Peminjam: <b><span id="mNama"></span></b></p>
    </div>
  </div>

  <!-- LOGIN MODAL -->
  <div class="modal" id="loginModal">
    <div class="modal-box">
      <h3>Login Admin</h3>
      <input type="password" id="pinInput" placeholder="Masukkan PIN" />
      <button class="btn btn-login" style="width: 100%" id="loginSubmit">
        Login
      </button>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal" id="editModal">
    <div class="modal-box">
      <h3>Edit Jadwal</h3>

      <input type="hidden" id="eId" />
      <input id="eRuangan" placeholder="Ruangan" />
      <input id="eAgenda" placeholder="Agenda" />
      <input type="date" id="eTanggal" />
      <input type="time" id="eMulai" />
      <input type="time" id="eSelesai" />
      <input id="eNama" placeholder="Nama" />

      <button class="btn btn-login" style="width: 100%" id="editSubmit">
        Simpan
      </button>
    </div>
  </div>   
  <script>

/* ===========================
   CONFIG
=========================== */

const API_URL = "https://script.google.com/macros/s/AKfycby_Ib2KyhAnT9QuX4LIJ_JvK5WZB5edi4Tb4sy_4sx7MzaPs0wpxnMm7rS5vKFTzUSF/exec";
const ADMIN_PIN_HASH = "8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92";

let DATA = [];
let ROLE = localStorage.getItem("role") || "user";

/* ===========================
   ELEMENT
=========================== */

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const loginModal = document.getElementById("loginModal");
const loginSubmit = document.getElementById("loginSubmit");
const pinInput = document.getElementById("pinInput");
const addBtn = document.getElementById("addBtn");

const arjuna = document.getElementById("arjuna");
const srikandi = document.getElementById("srikandi");
const gatot = document.getElementById("gatot");

const editModal = document.getElementById("editModal");
const editSubmit = document.getElementById("editSubmit");

const eId = document.getElementById("eId");
const eRuangan = document.getElementById("eRuangan");
const eAgenda = document.getElementById("eAgenda");
const eTanggal = document.getElementById("eTanggal");
const eMulai = document.getElementById("eMulai");
const eSelesai = document.getElementById("eSelesai");
const eNama = document.getElementById("eNama");

const clock = document.getElementById("clock");

/* ===========================
   LOGIN
=========================== */

function updateUI() {
  if (ROLE === "admin") {
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
    addBtn.style.display = "flex";
  } else {
    loginBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
    addBtn.style.display = "none";
  }
}

loginBtn.onclick = () => loginModal.style.display = "flex";

logoutBtn.onclick = () => {
  ROLE = "user";
  localStorage.removeItem("role");
  updateUI();
  render();
};

loginSubmit.onclick = async function () {
  const hashBuffer = await crypto.subtle.digest(
    "SHA-256",
    new TextEncoder().encode(pinInput.value)
  );

  const pinHash = [...new Uint8Array(hashBuffer)]
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");

  if (pinHash === ADMIN_PIN_HASH) {
    ROLE = "admin";
    localStorage.setItem("role", "admin");
    loginModal.style.display = "none";
    updateUI();
    render();
  } else {
    alert("PIN salah!");
  }
};

updateUI();

/* ===========================
   FORMAT TANGGAL
=========================== */

function formatTanggalIndo(tanggal) {
  return new Date(tanggal).toLocaleDateString("id-ID", {
    day: "numeric",
    month: "long",
    year: "numeric"
  });
}

/* ===========================
   LOAD DATA
=========================== */

async function loadData() {
  const res = await fetch(API_URL + "?_=" + Date.now());
  DATA = await res.json();

  sortData();   // 🔥 SORT PRIORITAS
  render();
}

/* ===========================
   SORT DATA (PRIORITAS CERDAS)
=========================== */
function sortData() {

  const now = new Date();

  DATA.sort((a, b) => {

    const dateA = new Date(a.tanggal);
    const dateB = new Date(b.tanggal);

    const [jamA, menitA] = a.mulai.split(":");
    const [jamB, menitB] = b.mulai.split(":");

    dateA.setHours(jamA, menitA, 0, 0);
    dateB.setHours(jamB, menitB, 0, 0);

    const diffA = dateA - now;
    const diffB = dateB - now;

    const isPastA = diffA < 0;
    const isPastB = diffB < 0;

    if (isPastA !== isPastB) {
      return isPastA ? 1 : -1;
    }

    if (!isPastA && !isPastB) {
      return diffA - diffB;
    }
    
    return dateB - dateA;
  });
}
   
/* ===========================
   RENDER
=========================== */

function render() {

  arjuna.innerHTML = "";
  srikandi.innerHTML = "";
  gatot.innerHTML = "";

  const now = new Date();

  DATA.forEach(d => {

    const el = document.createElement("div");
    el.className = "booking";

    const start = new Date(`${d.tanggal}T${d.mulai}`);
    const end   = new Date(`${d.tanggal}T${d.selesai}`);

    if (now >= start && now <= end) {
      el.classList.add("live");
    }

    el.innerHTML = `
      <div style="font-weight:600;margin-bottom:6px;">
        ${d.agenda}
      </div>

      <div style="font-size:13px;line-height:1.6;">
        📅 ${formatTanggalIndo(d.tanggal)} <br>
        ⏰ ${d.mulai} - ${d.selesai} <br>
        👤 ${d.nama}
      </div>

      ${
        ROLE === "admin"
        ? `
        <div style="margin-top:10px;">
          <button class="icon-btn icon-edit" onclick="editData('${d.id}')">✏️</button>
          <button class="icon-btn icon-delete" onclick="deleteData('${d.id}')">🗑️</button>
        </div>
        `
        : ""
      }
    `;

    if (d.ruangan === "Arjuna") arjuna.appendChild(el);
    if (d.ruangan === "Srikandi") srikandi.appendChild(el);
    if (d.ruangan === "Gatotkaca") gatot.appendChild(el);
  });
}

/* ===========================
   DELETE
=========================== */

async function deleteData(id) {
  if (!confirm("Yakin hapus?")) return;

  const formData = new FormData();
  formData.append("action","delete");
  formData.append("id",id);

  await fetch(API_URL,{ method:"POST", body:formData });
  loadData();
}

/* ===========================
   EDIT
=========================== */

function editData(id){
  const d = DATA.find(x => x.id == id);

  eId.value = d.id;
  eRuangan.value = d.ruangan;
  eAgenda.value = d.agenda;
  eTanggal.value = d.tanggal;
  eMulai.value = d.mulai;
  eSelesai.value = d.selesai;
  eNama.value = d.nama;

  editModal.style.display = "flex";
}

editSubmit.onclick = async function(){

  const formData = new FormData();
  formData.append("action","update");
  formData.append("id",eId.value);
  formData.append("ruangan",eRuangan.value);
  formData.append("agenda",eAgenda.value);
  formData.append("tanggal",eTanggal.value);
  formData.append("mulai",eMulai.value);
  formData.append("selesai",eSelesai.value);
  formData.append("nama",eNama.value);

  await fetch(API_URL,{ method:"POST", body:formData });

  editModal.style.display = "none";
  loadData();
};

/* ===========================
   JAM LIVE
=========================== */

setInterval(()=>{
  clock.textContent = new Date().toLocaleTimeString("id-ID");
},1000);

/* ===========================
   AUTO REFRESH DATA
=========================== */

setInterval(()=>{
  loadData();
},30000);

/* ===========================
   START
=========================== */

loadData();

</script>
