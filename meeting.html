<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jadwal Meeting</title>

<style>
body{
  margin:0;
  padding:20px;
  font-family:"Segoe UI",sans-serif;
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("mas.png") no-repeat center/cover;
  color:#fff;
}

.logo{
  display:block;
  width:130px;
  margin:0 auto 10px;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.top-bar{
  display:flex;
  align-items:center;
  margin-bottom:10px;
}

#clock{
  margin-right:auto;
  font-weight:600;
  background:rgba(255,255,255,.2);
  padding:6px 12px;
  border-radius:10px;
  backdrop-filter:blur(6px);
}

.btn{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.btn-login{ background:#00d4ff; color:#000; }
.btn-logout{ background:#ff4d4d; color:#fff; }

.container{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.column{
  flex:1;
  background:rgba(255,255,255,.15);
  padding:16px;
  border-radius:18px;
  min-width:260px;
}

.column h3{
  text-align:center;
  margin:6px 0 14px;
}

.booking{
  background:rgba(255,255,255,.25);
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;
  cursor:pointer;
  transition:.25s;
}

.booking:hover{
  transform:scale(1.02);
  background:rgba(255,255,255,.35);
}

.booking.live{
  background:rgba(0,255,120,.22)!important;
  border:2px solid rgba(0,255,120,.65);
  box-shadow:0 0 8px rgba(0,255,120,.35);
}

.booking.live::before{
  content:"● ";
  font-size:11px;
  font-weight:bold;
  color:rgba(0,255,120,.9);
}

.icon-btn{
  background:transparent;
  border:none;
  cursor:pointer;
  font-size:16px;
  margin-right:6px;
}

.icon-delete{ color:#ff4d4d; }
.icon-edit{ color:#00d4ff; }

.fab{
  position:fixed;
  right:24px;
  bottom:24px;
  width:64px;
  height:64px;
  border-radius:50%;
  background:linear-gradient(135deg,#00d4ff,#0090ff);
  color:#fff;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:36px;
  text-decoration:none;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  backdrop-filter:blur(8px);
}

.modal-box{
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("citylight.png") no-repeat center/cover;
  padding:26px;
  width:360px;
  border-radius:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
}

.modal-box h3{
  text-align:center;
  margin-bottom:14px;
}

.modal-box p{
  margin:10px 0;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,.15);
}

.close{
  float:right;
  cursor:pointer;
  font-size:18px;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin:6px 0;
}
</style>
</head>

<body>

<div class="top-bar">
  <div id="clock">--</div>
  <button id="loginBtn" class="btn btn-login">@</button>
  <button id="logoutBtn" class="btn btn-logout" style="display:none">Logout</button>
</div>

<img src="map-log.png" class="logo">

<h1>
  Jadwal Penggunaan Ruang Meeting <br>
  PT Mitra Asa Pratama
</h1>

<div class="container">
  <div class="column">
    <h3>Ruang Arjuna</h3>
    <div id="arjuna"></div>
  </div>

  <div class="column">
    <h3>Ruang Srikandi</h3>
    <div id="srikandi"></div>
  </div>

  <div class="column">
    <h3>Ruang Gatot Kaca</h3>
    <div id="gatot"></div>
  </div>
</div>

<a href="daftar.html" class="fab" id="addBtn">+</a>

<script>
const API_URL="https://script.google.com/macros/s/AKfycby_Ib2KyhAnT9QuX4LIJ_JvK5WZB5edi4Tb4sy_4sx7MzaPs0wpxnMm7rS5vKFTzUSF/exec";
const ADMIN_PIN_HASH="8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92";

let ROLE=localStorage.getItem("role")||"user";
let DATA=[];

/* CLOCK */
setInterval(()=>{
  clock.textContent=new Date().toLocaleString("id-ID");
},1000);

/* LOGIN */
loginBtn.onclick=()=>loginModal.style.display="flex";
logoutBtn.onclick=()=>{
  ROLE="user";
  localStorage.removeItem("role");
  updateUI();
  render();
};

async function hash(text){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* UPDATE UI */
function updateUI(){
  loginBtn.style.display=ROLE==="admin"?"none":"inline-block";
  logoutBtn.style.display=ROLE==="admin"?"inline-block":"none";
  addBtn.style.display=ROLE==="admin"?"flex":"none";
}

/* FORMAT */
function formatTanggalIndo(t){
  const d=new Date(t+"T00:00:00");
  return d.toLocaleDateString("id-ID",{day:"2-digit",month:"long",year:"numeric"});
}

/* LIVE */
function isLiveBooking(d){
  const now=new Date();
  const start=new Date(d.tanggal+"T"+d.mulai);
  const end=new Date(d.tanggal+"T"+d.selesai);
  return now>=start&&now<=end;
}

/* LOAD */
async function loadData(){
  const r=await fetch(API_URL+"?_="+Date.now());
  DATA=await r.json();
  DATA.sort((a,b)=>new Date(a.tanggal+"T"+a.mulai)-new Date(b.tanggal+"T"+b.mulai));
  render();
}

/* RENDER */
function render(){
  arjuna.innerHTML="";
  srikandi.innerHTML="";
  gatot.innerHTML="";

  DATA.forEach(d=>{
    const el=document.createElement("div");
    el.className="booking";
    if(isLiveBooking(d)) el.classList.add("live");

    el.innerHTML=`
      <b>${d.agenda}</b><br>
      📅 ${formatTanggalIndo(d.tanggal)}<br>
      ⏰ ${d.mulai} - ${d.selesai}<br>
      👤 ${d.nama}
      ${
        ROLE==="admin"
        ? `<br><br>
           <button class="icon-btn icon-edit">✏️ Edit</button>
           <button class="icon-btn icon-delete">🗑️ Hapus</button>`
        : ""
      }
    `;

    const r=d.ruangan.toLowerCase();
    if(r.includes("arjuna")) arjuna.appendChild(el);
    if(r.includes("srikandi")) srikandi.appendChild(el);
    if(r.includes("gatot")) gatot.appendChild(el);
  });
}

updateUI();
loadData();
</script>

</body>
</html>
